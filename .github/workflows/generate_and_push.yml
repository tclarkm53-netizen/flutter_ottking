name: Generate Fully Configured Flutter TV & Mobile Template

on:
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য

permissions:
  contents: write # গিটহাবে কোড পুশ করার পারমিশন

jobs:
  generate-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Create Flutter Project
        run: |
          # হাইফেন এরর এড়াতে আন্ডারস্কোর সহ ডার্ট প্যাকেজ নেম ব্যবহার
          flutter create --org com.ottking --project-name livetvapp_flutter --platforms android .

      - name: Configure Android Manifest (Mobile & Smart TV Support)
        run: |
          # একদম ফ্রেশ এবং ক্লিন ম্যানিফেস্ট ফাইল ওভাররাইট করা হচ্ছে যা মার্জার এরর দেবে না
          cat <<EOF > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              
              <!-- স্মার্ট এবং গুগল টিভির জন্য টাচস্ক্রিন আবশ্যিক নয় -->
              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />
              <uses-feature android:name="android.hardware.type.television" android:required="false" />

              <application
                  android:label="OTT-KING Live TV"
                  android:name="\${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:banner="@mipmap/ic_launcher">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                          
                      <!-- মোবাইল লঞ্চার -->
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                      
                      <!-- অ্যান্ড্রয়েড টিভি ও গুগল টিভি লঞ্চার -->
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
                      </intent-filter>
                  </activity>
                  
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Configure Gradle for Secure Production Signing
        run: |
          # key.properties ফাইলের পাথ এবং ভেরিয়েবল অ্যান্ড্রয়েড গ্রেডলে যুক্ত করা
          cat <<EOF > android/key.properties
          storePassword=\${System.getenv('KEYSTORE_PASSWORD')}
          keyPassword=\${System.getenv('KEY_PASSWORD')}
          keyAlias=\${System.getenv('KEY_ALIAS')}
          storeFile=../app/upload-keystore.jks
          EOF
          
          # app/build.gradle মডিফাই করে সিকিউর সাইনিং কনফিগারেশন ইনজেক্ট করা
          cd android/app
          cat <<EOF > build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new java.io.FileInputStream(keystorePropertiesFile))
          }

          android {
              namespace "com.ottking.livetvapp_flutter"
              compileSdk flutter.compileSdkVersion
              ndkVersion flutter.ndkVersion

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = '1.8'
              }

              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }

              defaultConfig {
                  applicationId "com.ottking.livetvapp_flutter"
                  minSdk 21  // গুগল টিভি এবং মডার্ন অ্যাপের জন্য মিনিমাম এসডিকে ২১ সেফ
                  targetSdk flutter.targetSdkVersion
                  versionCode flutter.versionCode
                  versionName flutter.versionName
              }

              signingConfigs {
                  release {
                      storeFile file(keystoreProperties['storeFile'] ?: 'upload-keystore.jks')
                      storePassword keystoreProperties['storePassword'] ?: System.getenv('KEYSTORE_PASSWORD')
                      keyAlias keystoreProperties['keyAlias'] ?: System.getenv('KEY_ALIAS')
                      keyPassword keystoreProperties['keyPassword'] ?: System.getenv('KEY_PASSWORD')
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled true  // সাইজ ছোট করার জন্য কোড অবফাসকেশন ও স্রিঙ্কিং চালু
                      shrinkResources true
                      proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
                  }
              }
          }

          flutter {
              source '../..'
          }
          EOF

      - name: Push Base Code to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🚀 System: Setup optimized Flutter codebase with TV configurations and signing rules"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes to commit"
          fi
